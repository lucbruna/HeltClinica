services:
  db:
    image: mariadb:10.11
    container_name: heltclinica-db
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MARIADB_ROOT_PASSWORD: admin
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 5

  redis-cache:
    image: redis:7-alpine
    container_name: heltclinica-redis-cache
    restart: unless-stopped
    volumes:
      - redis-cache-data:/data

  redis-fila:
    image: redis:7-alpine
    container_name: heltclinica-redis-fila
    restart: unless-stopped
    volumes:
      - redis-fila-data:/data

  configurador:
    image: heltclinica:v15
    container_name: heltclinica-configurador
    restart: no
    depends_on:
      - db
      - redis-cache
      - redis-fila
    entrypoint: ["bash", "-c"]
    command:
      - >
        ls -1 apps > sites/apps.txt;
        bench set-config -g db_host $$DB_HOST;
        bench set-config -gp db_port $$DB_PORT;
        bench set-config -g redis_cache "redis://$$REDIS_CACHE";
        bench set-config -g redis_queue "redis://$$REDIS_FILA";
        bench set-config -g redis_socketio "redis://$$REDIS_FILA";
        bench set-config -gp socketio_port $$PORTA_SOCKETIO;
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      REDIS_CACHE: redis-cache:6379
      REDIS_FILA: redis-fila:6379
      PORTA_SOCKETIO: "9000"
    volumes:
      - sites:/home/frappe/frappe-bench/sites

  criar-site:
    image: heltclinica:v15
    container_name: heltclinica-criar-site
    restart: no
    depends_on:
      - configurador
    entrypoint: ["bash", "-c"]
    command:
      - >
        wait-for-it -t 120 db:3306;
        wait-for-it -t 120 redis-cache:6379;
        wait-for-it -t 120 redis-fila:6379;
        export inicio=`date +%s`;
        until [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".db_host // empty"` ]] &&
          [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_cache // empty"` ]] &&
          [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_queue // empty"` ]];
        do
          echo "Aguardando configuracao do common_site_config.json...";
          sleep 5;
          if (( `date +%s`-inicio > 120 )); then
            echo "Nao foi Possivel encontrar common_site_config.json com as chaves necessarias";
            exit 1
          fi
        done;
        echo "Arquivo de configuracao encontrado!";
        if [ ! -d "sites/site1" ]; then
          echo "Criando site com ERPNext e Healthcare...";
          bench new-site --mariadb-user-host-login-scope='%' --admin-password=admin --db-root-username=root --db-root-password=admin --install-app erpnext --install-app healthcare site1;
        else
          echo "Site ja existe. Executando migracoes...";
          bench --site site1 migrate;
        fi;
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      REDIS_CACHE: redis-cache:6379
      REDIS_FILA: redis-fila:6379
      SENHA_ADMIN: admin
    volumes:
      - sites:/home/frappe/frappe-bench/sites

  backend:
    image: heltclinica:v15
    container_name: heltclinica-backend
    restart: unless-stopped
    depends_on:
      - db
      - redis-cache
      - redis-fila
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      REDIS_CACHE: redis-cache:6379
      REDIS_FILA: redis-fila:6379

  frontend:
    image: heltclinica:v15
    container_name: heltclinica-frontend
    restart: unless-stopped
    depends_on:
      - backend
      - websocket
    command: ["nginx-entrypoint.sh"]
    environment:
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
      FRAPPE_SITE_NAME_HEADER: site1
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: 120
      CLIENT_MAX_BODY_SIZE: 50m
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    ports:
      - "8080:8080"

  fila-padrao:
    image: heltclinica:v15
    container_name: heltclinica-fila-padrao
    restart: unless-stopped
    depends_on:
      - backend
    command: ["bench", "worker", "--queue", "long,default,short"]
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    environment:
      FRAPPE_REDIS_CACHE: redis://redis-cache:6379
      FRAPPE_REDIS_QUEUE: redis://redis-fila:6379

  fila-curta:
    image: heltclinica:v15
    container_name: heltclinica-fila-curta
    restart: unless-stopped
    depends_on:
      - backend
    command: ["bench", "worker", "--queue", "short,default"]
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    environment:
      FRAPPE_REDIS_CACHE: redis://redis-cache:6379
      FRAPPE_REDIS_QUEUE: redis://redis-fila:6379

  agendador:
    image: heltclinica:v15
    container_name: heltclinica-agendador
    restart: unless-stopped
    depends_on:
      - backend
    command: ["bench", "schedule"]
    volumes:
      - sites:/home/frappe/frappe-bench/sites

  websocket:
    image: heltclinica:v15
    container_name: heltclinica-websocket
    restart: unless-stopped
    command: ["node", "/home/frappe/frappe-bench/apps/frappe/socketio.js"]
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    environment:
      FRAPPE_REDIS_CACHE: redis://redis-cache:6379
      FRAPPE_REDIS_QUEUE: redis://redis-fila:6379

volumes:
  db-data:
  redis-cache-data:
  redis-fila-data:
  sites:
