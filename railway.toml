[project]
name = "HeltClinica"
description = "Sistema de gestao clinica baseado em ERPNext + Healthcare"

[[service]]
name = "backend"
build = "Dockerfile"

[service.ports]
http = "8000"

[service.variables]
# Variaveis fixas do projeto
ADMIN_PASSWORD = "admin"
SITE_NAME = "site1"
SITE_DB_PREFIX = "heltclinica"

# Variaveis compartilhadas (nomes do .env)
SENHA_ADMIN = "admin"
NOME_SITE = "site1"
PORTA_SOCKETIO = "9000"

[service.volumes]
mount = "/home/frappe/frappe-bench/sites"
name = "sites-data"
